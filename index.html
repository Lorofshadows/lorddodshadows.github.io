<!DOCTYPE html>
<html>
<head>
    <title>Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {margin: 50px; text-align: center; font-family: Arial;}
        button {font-size: 30px; padding: 20px 40px; margin: 20px;}
        #count {font-size: 50px; font-weight: bold; color: #2481cc;}
    </style>
</head>
<body>
    <h1>🎯 Простой кликер</h1>
    <div id="count">0</div>
    <button onclick="clickMe()">КЛИКНИ</button>
    <p id="status">Готов к кликам...</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let count = 0;
        
        function clickMe() {
            count++;
            document.getElementById('count').textContent = count;
            
            // Отправляем боту
            tg.sendData(JSON.stringify({
                action: 'click',
                count: count,
                time: new Date().toLocaleTimeString()
            }));
            
            document.getElementById('status').textContent = '✅ Отправлено боту!';
            
            // Через 2 секунды очищаем статус
            setTimeout(() => {
                document.getElementById('status').textContent = 'Готов к кликам...';
            }, 2000);
        }
    </script>
</body>
</html>
